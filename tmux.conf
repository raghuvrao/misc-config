unbind-key C-b
set-option -g prefix C-a
bind-key a send-prefix

bind-key C-a last-window
bind-key S set-option synchronize-panes

set-option -s escape-time 0

set-option -g base-index 1
set-option -g default-terminal "screen-256color"
set-option -g history-limit 10000
set-option -g status-left "(#S:#P)"
set-option -g status-right ""
set-option -g default-command /bin/bash
set-option -g status on
set-option -g status-utf8 on

set-window-option -g aggressive-resize on

# Color settings
set-option -g status-bg blue
set-option -g status-fg white
set-option -g pane-active-border-fg green
set-option -g pane-active-border-bg default
set-window-option -g window-status-current-fg white
set-window-option -g window-status-current-bg red

# Activity in windows
# Just highlight the window; no need for a message
set-option -g visual-activity off
set-window-option -g monitor-activity on
set-window-option -g window-status-activity-fg default
set-window-option -g window-status-activity-bg default

# Emacs-style key-bindings for copying/pasting
set-window-option -g mode-keys emacs
