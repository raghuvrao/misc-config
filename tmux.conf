# C-b is not acceptable -- Vim uses it
set-option -g prefix C-a
bind-key C-a last-window

# Start numbering at 1
set-option -g base-index 1

# Allows for faster key repetition
set-option -s escape-time 0

# set status bar
set-option -g status-bg black
set-option -g status-fg white
set-option -g status-left "#S:#P"
set-option -g status-right ""

# Highlight current window
set-window-option -g window-status-current-bg red
set-window-option -g window-status-current-fg white

# Color settings for non-focussed windows with activity
set-window-option -g window-status-activity-bg cyan
set-window-option -g window-status-activity-fg black

# Rather than constraining window size to the maximum size of any client 
# connected to the *session*, constrain window size to the maximum size of any 
# client connected to *that window*. Much more reasonable.
set-window-option -g aggressive-resize on

# Allows us to use C-a a <command> to send commands to a TMUX session inside 
# another TMUX session
bind-key a send-prefix

# Activity monitoring
set-window-option -g monitor-activity on
set-option -g visual-activity on

# set some vi-style key bindings
set-window-option -g mode-keys emacs

# Mouse-mode is helpful
set-window-option -g mode-mouse on

# Use 256 colors
set-option -g default-terminal screen-256color
